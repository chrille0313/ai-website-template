name: Generate Types

on:
  pull_request:
    branches: ["main", "master", "development", "develop"]
    paths:
      - "supabase/**"
      - "apps/web/src/integrations/supabase/types.gen.ts"

jobs:
  generate-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase db start

      - name: Verify generated types match Postgres schema
        run: |
          supabase gen types typescript --local > apps/web/src/integrations/supabase/types.gen.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet apps/web/src/integrations/supabase/types.gen.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi
